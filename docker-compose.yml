services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dynamic-pricing-api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: dynamic-pricing-dashboard
    env_file:
      - .env.example
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - api
    restart: unless-stopped
